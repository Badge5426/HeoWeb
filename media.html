<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="/main.css">

  <!-- APlayer 依赖 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
  <script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>

  <style>
    #方案,#产品,#服务,#案例,#关于 { padding-top:80px; margin-top:-80px; display:block; position:relative; }
    
    /* 音乐播放器样式 */
    .music-player {
      max-width: 600px;
      margin: 40px auto 0;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
    }
    .music-player h3 {
      margin-bottom: 16px;
      font-size: 20px;
      color: #333;
    }
    audio {
      width: 100%;
      border-radius: 12px;
      outline: none;
    }
    .aplayer {
      z-index: 999999 !important;
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="nav-content">
      <div class="nav-left">
        <a href="/index.html" class="site-logo">
          <img src="/img/logo.webp" alt="logo" class="site-logo-img">

        <a href="/index.html#方案" class="nav-item">方案</a>

    <!-- 音乐播放器 -->

      </div>
    </div>
  </div>

<!-- 悬浮播放器 唯一新增的部分，不会影响任何原有内容 -->
<div id="myplayer"></div>
<script>
const ap = new APlayer({
  container: document.getElementById('myplayer'),
  fixed: true,
  autoplay: false,
  loop: true,
  volume: 0.5,
  audio: [{
    name: "背景音乐",
    artist: "夏飞智能家居",
    url: "https://cdn.pondly.cc/audio/relax.mp3",
  }]
});
</script>
